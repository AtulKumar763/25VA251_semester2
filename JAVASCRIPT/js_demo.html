<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction</title>
</head>
<body>
    <h2>Java Script</h2>
    <script>
// Variables in JavaScript are used to store data values. They can be declared in different ways depending on how the value should behave.
// Variables can be declared using var, let, or const.
// JavaScript is dynamically typed, so types are decided at runtime.
// You don’t need to specify a data type when creating a variable.

// using var keyword 
var myName = "atulkumar";

document.write(myName);
console.log(myName);

//js scope and function
function hello(){
    var msg = "THANks TO VISIT";
    console.log(msg);

}
hello();

function hello2(){
var message = "Hii come";
console.log(message);
}
hello2();

//variable declaration using let and const;
let roll = 2503201000346;
console.log(roll);

roll = 3425632;
console.log(roll);

const myphonenumber = 30483931093;
console.log(myphonenumber);
    </script>
</body>
</html>
